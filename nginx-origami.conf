server {
    listen 80;
    server_name work.kakacha.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name work.kakacha.space;

    ssl_certificate /etc/letsencrypt/live/work.kakacha.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/work.kakacha.space/privkey.pem;

    gzip on;
    gzip_types text/plain application/javascript application/wasm application/octet-stream;
    gzip_min_length 1024;
    gzip_comp_level 6;

    location /origami/ {
        alias /var/www/origami-battle/web/;
        index index.html;

        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";

        try_files $uri $uri/ /origami/index.html;
    }
}
